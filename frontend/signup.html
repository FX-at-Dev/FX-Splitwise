<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - FX Splitwise</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Start sharing expenses</p>
      <h1>Signup</h1>
      <p class="muted">Create your account to build groups and settle balances.</p>
      <form data-auth-form data-endpoint="/signup">
        <label>
          Name
          <input name="name" type="text" required />
        </label>
        <label>
          Username
          <input
            name="username"
            type="text"
            minlength="3"
            maxlength="20"
            pattern="[A-Za-z0-9_]+"
            title="Use 3-20 letters, numbers, or underscore"
            required
          />
        </label>
        <label>
          Email
          <input name="email" type="email" required />
        </label>
        <label>
          Password
          <input name="password" type="password" minlength="6" required />
        </label>
        <button class="button primary" type="submit">Create account</button>
      </form>
      <p class="notice" data-auth-message></p>
      <p class="muted">Already have an account? <a href="login.html">Log in</a></p>
    </section>
  </main>
  <script src="js/runtime-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
