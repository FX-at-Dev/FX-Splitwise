<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - FX Splitwise</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Account recovery</p>
      <h1>Forgot Password</h1>
      <p class="muted">Request a reset link, then use the token from that link to set a new password.</p>

      <form data-forgot-form>
        <label>
          Email
          <input name="email" type="email" required />
        </label>
        <button class="button secondary" type="submit">Send reset link</button>
      </form>

      <p class="auth-divider">Reset</p>

      <form data-reset-form>
        <label>
          Reset token
          <input name="token" type="text" required />
        </label>
        <label>
          New password
          <input name="password" type="password" minlength="6" required />
        </label>
        <button class="button primary" type="submit">Reset password</button>
      </form>

      <p class="notice" data-reset-message></p>
      <p class="muted"><a href="login.html">Back to login</a></p>
    </section>
  </main>
  <script src="js/runtime-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
