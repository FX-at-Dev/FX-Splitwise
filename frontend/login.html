<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FX Splitwise</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Welcome back</p>
      <h1>Login</h1>
      <p class="muted">Access your groups, balances, and settlements.</p>
      <form data-auth-form data-endpoint="/login">
        <label>
          Email
          <input name="email" type="email" required />
        </label>
        <label>
          Password
          <input name="password" type="password" required />
        </label>
        <button class="button primary" type="submit">Login</button>
      </form>
      <p class="auth-link-row"><a href="forgot-password.html">Forgot password?</a></p>
      <p class="notice" data-auth-message></p>
      <p class="muted">New here? <a href="signup.html">Create an account</a></p>
    </section>
  </main>
  <script src="js/runtime-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
